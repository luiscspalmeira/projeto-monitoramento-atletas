<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Monitoramento de Atletas</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="barra-acessibilidade">

        <button onclick="diminuirFonte()" aria-label="Diminuir tamanho da fonte">

            A-

        </button>

        <button onclick="aumentarFonte()" aria-label="Aumentar tamanho da fonte">

            A+

        </button>

        <button onclick="alternarContraste()" id="btnContraste" aria-label="Alternar alto contraste">

            🌙 Alto Contraste

        </button>

    </div>

    <div class="container">

        <h1>Monitoramento de Atletas</h1>

        <h2>Login</h2>

        <div class="campo">

            <label>E-mail</label>

            <input type="email" id="email">

        </div>

        <div class="campo">

            <label>Senha</label>

            <input type="password" id="senha">

        </div>

        <div class="campo">

            <label>Tipo de usuário</label>

            <select id="tipo">

                <option value="ATLETA">
                    Atleta
                </option>

                <option value="PCD">
                    Atleta PcD
                </option>

                <option value="INSTRUTOR">
                    Instrutor
                </option>

            </select>

        </div>

        <button id="btnEntrar" type="button">

            Entrar

        </button>

        <br><br>

        <button onclick="window.location='cadastro-atleta.html'">

            Cadastrar Atleta

        </button>

        <button onclick="window.location='cadastro-instrutor.html'">

            Cadastrar Instrutor

        </button>


    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
    <script src="js/acessibilidade.js"></script>

</body>

</html>
