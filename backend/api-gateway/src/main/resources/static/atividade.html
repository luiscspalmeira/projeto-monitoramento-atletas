<!DOCTYPE html>
<html>

<head>

    <title>Atividade</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="barra-acessibilidade">

        <button onclick="diminuirFonte()" aria-label="Diminuir tamanho da fonte">

            A-

        </button>

        <button onclick="aumentarFonte()" aria-label="Aumentar tamanho da fonte">

            A+

        </button>

    </div>

    <div class="container">

        <div class="card">

            <h2>Registrar Atividade</h2>



            <select id="modalidade">

                <option>CORRIDA</option>

                <option>BICICLETA</option>

                <option>NATACAO</option>

            </select>

            <input id="distancia" placeholder="Distância">

            <input id="tempo" placeholder="Tempo">

            <input type="date" id="data">

            <button onclick="salvarAtividade()">

                Salvar

            </button>

            <button onclick="window.location='dashboard.html'">

                Voltar ao Dashboard

            </button>

        </div>

    </div>

    <script src="js/api.js"></script>
    <script src="js/atividade.js"></script>
    <script src="js/acessibilidade.js"></script>

</body>

</html>
