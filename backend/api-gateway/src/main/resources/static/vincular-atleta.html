<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vincular Atleta ao Instrutor</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container">

        <h1>Vincular Atleta ao Instrutor</h1>

        <div class="card">

            <div class="campo">

                <label for="instrutor">

                    Instrutor

                </label>

                <select id="instrutor">

                    <option>

                        Carregando...

                    </option>

                </select>

            </div>

            <div class="campo">

                <label for="atleta">

                    Atleta

                </label>

                <select id="atleta">

                    <option>

                        Carregando...

                    </option>

                </select>

            </div>

            <button onclick="vincular()">

                Vincular

            </button>

        </div>

        <br>

        <div class="card">

            <h2>

                Atletas Vinculados

            </h2>

            <table id="tabelaVinculos">

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Nome</th>

                        <th>Email</th>

                        <th>PcD</th>

                    </tr>

                </thead>

                <tbody>

                </tbody>

            </table>

        </div>

        <br>

        <button onclick="window.location='painel-instrutor.html'">

            Voltar ao Painel

        </button>

    </div>

    <script src="js/api.js"></script>
    <script src="js/vincular-atleta.js"></script>

</body>

</html>
