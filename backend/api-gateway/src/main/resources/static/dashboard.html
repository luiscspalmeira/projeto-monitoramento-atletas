<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard do Atleta</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <div class="barra-acessibilidade">

        <button onclick="diminuirFonte()"
                aria-label="Diminuir tamanho da fonte">

            A-

        </button>

        <button onclick="aumentarFonte()"
                aria-label="Aumentar tamanho da fonte">

            A+

        </button>

    </div>

    <div class="container-dashboard">

        <header>

            <h1>

                Dashboard do Atleta

            </h1>

            <h3 id="usuarioLogado"></h3>

        </header>

        <hr>

        <!-- ==========================
         INDICADORES
    =========================== -->

        <div class="cards indicadores">

            <div class="card indicador">

                <h3>Total de Treinos</h3>

                <p id="totalTreinos">

                    0

                </p>

            </div>

            <div class="card indicador">

                <h3>Distância</h3>

                <p id="distanciaTotal">

                    0 km

                </p>

            </div>

            <div class="card indicador">

                <h3>Tempo</h3>

                <p id="tempoTotal">

                    0 min

                </p>

            </div>

            <div class="card indicador">

                <h3>Média por Treino</h3>

                <p id="mediaTreino">

                    0 km

                </p>

            </div>

        </div>

        <br>

        <!-- ==========================
         RESUMOS
    =========================== -->

        <div class="cards">

            <div class="card">

                <h2>

                    Resumo Semanal

                </h2>

                <div id="resumoSemanal">

                    Carregando...

                </div>

            </div>

            <div class="card">

                <h2>

                    Resumo Mensal

                </h2>

                <div id="resumoMensal">

                    Carregando...

                </div>

            </div>

        </div>

        <br>

        <!-- ==========================
         GRÁFICO DE BARRAS
    =========================== -->

        <div class="card">

            <h2>

                Atividades realizadas nas últimas quatro semanas

            </h2>

            <canvas id="graficoBarras"></canvas>

        </div>

        <br>

        <!-- ==========================
         PIZZA + HISTÓRICO
    =========================== -->

        <div class="cards">

            <div class="card">

                <h2>

                    Modalidades Praticadas

                </h2>

                <canvas id="graficoPizza"></canvas>

            </div>

            <div class="card">

                <h2>

                    Últimos Treinos

                </h2>

                <table id="tabelaUltimosTreinos">

                    <thead>

                        <tr>

                            <th>Data</th>

                            <th>Modalidade</th>

                            <th>Km</th>

                            <th>Tempo</th>

                        </tr>

                    </thead>

                    <tbody>

                    </tbody>

                </table>

            </div>

        </div>

        <br>

        <!-- ==========================
         BOTÕES
    =========================== -->

        <div class="botoes-dashboard">

            <button onclick="window.location='atividade.html'">

                Nova Atividade

            </button>

            <button onclick="window.location='historico.html'">

                Histórico Completo

            </button>

            <button onclick="logout()">

                Sair

            </button>

        </div>

    </div>
    
    
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/acessibilidade.js"></script>

</body>

</html>
