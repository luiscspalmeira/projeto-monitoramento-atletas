<!DOCTYPE html>
<html>

<head>

    <title>Cadastro Atleta</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="barra-acessibilidade">

        <button onclick="diminuirFonte()" aria-label="Diminuir tamanho da fonte">

            A-

        </button>

        <button onclick="aumentarFonte()" aria-label="Aumentar tamanho da fonte">

            A+

        </button>

    </div>

    <div class="container">

        <div class="card">

            <h2>Cadastro de Atleta</h2>

            <input id="nome" placeholder="Nome">

            <input id="email" placeholder="Email">

            <input id="senha" placeholder="Senha">

            <select id="pcd">

                <option value="false">
                    Não PcD
                </option>

                <option value="true">
                    PcD
                </option>

            </select>

            <button onclick="salvarAtleta()">
                Salvar
            </button>

        </div>

    </div>

    <script src="js/api.js"></script>
    <script src="js/cadastro.js"></script>
    <script src="js/acessibilidade.js"></script>

</body>

</html>
