server:
  port: 8080

spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  application:
    name: user-service