server:
  port: 8081

spring:

  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: admin
    password: admin

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

services:

  user:
    url: http://localhost:8081

  activity:
    url: http://localhost:8082

  dashboard:
    url: http://localhost:8083

  gateway:
    url: http://localhost:8080